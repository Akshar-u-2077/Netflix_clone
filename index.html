<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Parkinsans:wght@300..800&family=VT323&display=swap');
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix India – Watch Shows Online, Watch Movies Online</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <nav>
            <span class="logo"><img src="assets/img/netflix.svg" width=150 alt=""></span>
            <div class="top-buttons">
                <button class="language">English</button>
                <button class="btn-red-sign-in">Sign in</button>
            </div>
        </nav>
        <div class="box">
        </div>
        <div class="hero">
            <span>Unlimited movies, shows, and more</span>
            <span>Starts at ₹149. Cancel at any time.</span>
            <span>Ready to watch? Enter your email to create or restart your membership.</span>
            <div class="btns">
                <input type="text" placeholder="Email Address">
                <button class="btn-red">Get Started &gt;</button>
            </div>
        </div>

    </div>
    <div class="separation">
    </div>

    <div class="trending_cards">
        <span class="trending">
            Trending Now
        </span>
        <div class="cards">
            <div class="card">
                <span class="rank">1</span>
                <img src="/assets/img/border2.webp">
            </div>
            <div class="card">
                <span class="rank">2</span>
                <img src="/assets/img/durandar.webp">
            </div>
            <div class="card">
                <span class="rank">3</span>
                <img src="/assets/img/kkshow.webp">
            </div>
            <div class="card">
                <span class="rank">4</span>
                <img src="/assets/img/mardaani3.webp">
            </div>
            <div class="card">
                <span class="rank">5</span>
                <img src="/assets/img/onepiece.webp">
            </div>
            <div class="card">
                <span class="rank">6</span>
                <img src="/assets/img/made_in_korea.webp">
            </div>
            <div class="card">
                <span class="rank">7</span>
                <img src="/assets/img/taskare.webp">
            </div>
            <div class="card">
                <span class="rank">8</span>
                <img
                    src="/assets/img/AAAABXXZHzRKEfJLeuq-IFjToZU-HNb2cX9tV-Dr4nkpeUAFS5CDRjC8aWTs9XXjG382eoPpacafZZQVyy_kzGbgnAUIpYOk5JI09yk.webp">
            </div>
        </div>
    </div>
<div class="extra-things">
    More Reasons to Join
    <div class="tv">
        <title>Enjoy on your TV</title>
        <p>
            Watch on smart TVs, PlayStation, Xbox, Chromecast, Apple TV, Blu-ray players and more.
        </p>
    </div>
</div>
